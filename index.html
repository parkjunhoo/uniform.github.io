    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; font-size: 24px; }

        /* 기본 테이블 스타일 */
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #f4f4f4; color: #555; padding: 15px; text-align: center; font-size: 14px; border-bottom: 2px solid #eee; }
        td { border-bottom: 1px solid #eee; padding: 20px 10px; text-align: center; vertical-align: middle; }
        
        .img-wrapper { 
            width: 100%;
            max-width: 250px; 
            height: 300px; 
            margin: 0 auto; 
            background-color: #fff;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
        }
        .prod-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            transition: transform 0.3s ease;
        }
        
        .prod-name { font-size: 18px; font-weight: bold; color: #002c5f; display: block; }
        .prod-id { font-size: 13px; color: #aaa; margin-top: 4px; display: block; }
        
        .btn-link { 
            text-decoration: none; 
            background: #002c5f; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 500;
            display: inline-block;
        }

        /* 모바일 대응 핵심 코드 */
        @media screen and (max-width: 600px) {
            .container { padding: 15px; border-radius: 0; box-shadow: none; }
            h1 { font-size: 20px; }
            
            /* 테이블을 카드 형태로 변환 */
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; } /* 모바일에서 제목 행 숨김 */
            
            tr { 
                margin-bottom: 30px; 
                border: 1px solid #eee; 
                border-radius: 12px; 
                padding: 15px;
                background: #fff;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }
            
            td { 
                border: none; 
                padding: 10px 0; 
                width: 100% !important; 
            }
            
            .img-wrapper { height: 350px; max-width: 100%; } /* 모바일에서 이미지 더 크게 */
            .prod-name { font-size: 22px; margin-top: 10px; }
            .btn-link { width: 80%; padding: 15px 0; font-size: 16px; margin-top: 10px; }
        }
    </style>
</head>
