    <style>
        /* [기본 스타일] */
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #1a1a1a; margin-bottom: 30px; font-size: 24px; }

        /* [테이블 스타일] */
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #f4f4f4; color: #555; padding: 15px; text-align: center; font-size: 14px; border-bottom: 2px solid #eee; }
        td { border-bottom: 1px solid #eee; padding: 20px 10px; text-align: center; vertical-align: middle; }
        
        .img-wrapper { 
            width: 100%;
            max-width: 250px; 
            height: 300px; 
            margin: 0 auto; 
            background-color: #fff;
            border: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 8px;
        }
        .prod-img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            transition: transform 0.3s ease;
            cursor: zoom-in; /* 클릭 가능함을 표시 */
        }
        .prod-img:hover { transform: scale(1.05); }
        
        .prod-name { font-size: 18px; font-weight: bold; color: #002c5f; display: block; }
        .prod-id { font-size: 13px; color: #aaa; margin-top: 4px; display: block; }
        
        .btn-link { 
            text-decoration: none; 
            background: #002c5f; 
            color: white; 
            padding: 10px 20px; 
            border-radius: 30px; 
            font-size: 14px; 
            font-weight: 500;
            display: inline-block;
        }

        /* [이미지 크게 보기 모달 CSS] */
        #imgModal {
            display: none; 
            position: fixed; 
            z-index: 9999; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.85); 
            align-items: center; 
            justify-content: center;
            cursor: zoom-out;
            backdrop-filter: blur(5px);
        }
        #modalImg {
            max-width: 95%;
            max-height: 90%;
            border-radius: 4px;
            animation: zoomAnim 0.25s ease-out;
        }
        @keyframes zoomAnim {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* [모바일 대응] */
        @media screen and (max-width: 600px) {
            .container { padding: 15px; border-radius: 0; box-shadow: none; }
            h1 { font-size: 20px; }
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr { 
                margin-bottom: 30px; 
                border: 1px solid #eee; 
                border-radius: 12px; 
                padding: 15px;
                background: #fff;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            }
            td { border: none; padding: 10px 0; width: 100% !important; }
            .img-wrapper { height: 350px; max-width: 100%; }
            .prod-name { font-size: 22px; margin-top: 10px; }
            .btn-link { width: 80%; padding: 15px 0; font-size: 16px; margin-top: 10px; }
        }
    </style>
</head>

<div id="imgModal">
    <img id="modalImg" src="" alt="확대 이미지">
</div>

<script>
    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");
    const images = document.querySelectorAll(".prod-img");

    // 이미지 클릭 시 모달 열기
    images.forEach(img => {
        img.addEventListener("click", function() {
            modal.style.display = "flex";
            modalImg.src = this.src;
        });
    });

    // 모달 클릭 시 닫기 (배경 클릭 포함)
    modal.addEventListener("click", function() {
        modal.style.display = "none";
    });

    // ESC 키로 닫기
    document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") modal.style.display = "none";
    });
</script>
